[woocommerce]
# Your shop's base URL (no trailing slash)
shop_url = https://wordpress.local

# WooCommerce REST API credentials
# Generate them at: WP Admin → WooCommerce → Settings → Advanced → REST API
consumer_key    = ck_9dfb1d1bdb7352822bbd7bbe80539ab7c6e92398
consumer_secret = cs_d90c82735e3368699aabc3a95fa01f11dac33f73

[settings]
# Status to set on every order in the CSV
status_to_set   = completed

# Seconds to wait for each API response
request_timeout = 30

# Seconds to wait between retry attempts
retry_delay     = 2

# Maximum number of attempts per order before marking it as failed
max_retries     = 3

# Seconds to wait between the end of one API call and the start of the next
call_delay      = 1